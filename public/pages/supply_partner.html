<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supply Partner Console</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body><main class="shell">
  <section class="topbar">
    <h1>Supply Partner Console</h1>
    <div class="role-nav"><a href="/pages/index.html">All Roles</a></div>
    <div class="controls">
      <input id="authEmail" value="supplier1@fresh2u.local" />
      <input id="authPassword" type="password" value="pass123456" />
      <input id="authTenant" placeholder="tenant merchant id" />
      <button id="loginBtn">Login</button>
    </div>
    <pre id="authOut" class="out"></pre>
  </section>

  <section class="grid">
    <article class="card">
      <h2>Create Settlement (Supply Partner)</h2>
      <textarea id="settleBody">{"owner_type":"supply_partner","owner_id":""}</textarea>
      <button id="settleBtn">POST /settlements</button>
      <pre id="settleOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Request Withdrawal</h2>
      <textarea id="withdrawBody">{"owner_type":"supply_partner","owner_id":"","amount":120.00,"fee_amount":2.00,"account_name":"Supplier A","account_no":"622200000","account_type":"bank"}</textarea>
      <button id="withdrawBtn">POST /withdrawals</button>
      <pre id="withdrawOut" class="out"></pre>
    </article>
  </section>
</main>
<script src="/assets/app.js"></script>
<script>
Fresh2U.bindAuthPanel();
document.getElementById("settleBtn").onclick = async () => {
  try { Fresh2U.print("settleOut", await Fresh2U.api("/api/v1/settlements", "POST", JSON.parse(document.getElementById("settleBody").value))); }
  catch (e) { Fresh2U.print("settleOut", e.message); }
};
document.getElementById("withdrawBtn").onclick = async () => {
  try { Fresh2U.print("withdrawOut", await Fresh2U.api("/api/v1/withdrawals", "POST", JSON.parse(document.getElementById("withdrawBody").value))); }
  catch (e) { Fresh2U.print("withdrawOut", e.message); }
};
</script>
</body></html>
