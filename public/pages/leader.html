<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leader Console</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
<main class="shell">
  <section class="topbar">
    <h1>Leader Console</h1>
    <div class="role-nav"><a href="/pages/index.html">All Roles</a></div>
    <div class="controls">
      <input id="authEmail" placeholder="email" value="leader1@fresh2u.local" />
      <input id="authPassword" type="password" placeholder="password" value="pass123456" />
      <input id="authTenant" placeholder="tenant merchant id" />
      <button id="loginBtn">Login</button>
    </div>
    <pre id="authOut" class="out"></pre>
  </section>

  <section class="grid">
    <article class="card">
      <h2>Create Campaign</h2>
      <textarea id="campaignBody">{"product_id":"","campaign_title":"Morning Vegetable Pack","campaign_price":15.80}</textarea>
      <button id="campaignBtn">POST /campaigns</button>
      <pre id="campaignOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Consolidate Leader Order</h2>
      <textarea id="consolidateBody">{"member_order_ids":[],"pickup_hub_id":""}</textarea>
      <button id="consolidateBtn">POST /leader-orders/consolidate</button>
      <pre id="consolidateOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Create Delivery Task</h2>
      <textarea id="deliveryBody">{"member_order_id":"","leader_order_id":"","pickup_hub_id":"","driver_user_id":"","driver_type":"leader_self"}</textarea>
      <button id="deliveryBtn">POST /delivery-tasks</button>
      <pre id="deliveryOut" class="out"></pre>
    </article>
  </section>
</main>
<script src="/assets/app.js"></script>
<script>
Fresh2U.bindAuthPanel();

document.getElementById("campaignBtn").onclick = async () => {
  try {
    Fresh2U.print("campaignOut", await Fresh2U.api("/api/v1/campaigns", "POST", JSON.parse(document.getElementById("campaignBody").value)));
  } catch (e) { Fresh2U.print("campaignOut", e.message); }
};

document.getElementById("consolidateBtn").onclick = async () => {
  try {
    Fresh2U.print("consolidateOut", await Fresh2U.api("/api/v1/leader-orders/consolidate", "POST", JSON.parse(document.getElementById("consolidateBody").value)));
  } catch (e) { Fresh2U.print("consolidateOut", e.message); }
};

document.getElementById("deliveryBtn").onclick = async () => {
  try {
    Fresh2U.print("deliveryOut", await Fresh2U.api("/api/v1/delivery-tasks", "POST", JSON.parse(document.getElementById("deliveryBody").value)));
  } catch (e) { Fresh2U.print("deliveryOut", e.message); }
};
</script>
</body>
</html>
