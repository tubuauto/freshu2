<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Merchant Console</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
<main class="shell">
  <section class="topbar">
    <h1>Merchant Console</h1>
    <div class="role-nav"><a href="/pages/index.html">All Roles</a></div>
    <div class="controls">
      <input id="authEmail" placeholder="email" value="merchant1@fresh2u.local" />
      <input id="authPassword" type="password" value="pass123456" />
      <input id="authTenant" placeholder="tenant merchant id" />
      <button id="loginBtn">Login</button>
    </div>
    <pre id="authOut" class="out"></pre>
  </section>

  <section class="grid">
    <article class="card">
      <h2>Create Product</h2>
      <textarea id="productBody">{"name":"Organic Cucumber","description":"Farm fresh","base_price":12.50}</textarea>
      <button id="productBtn">POST /products</button>
      <pre id="productOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Route Fulfillment</h2>
      <input id="leaderOrderId" placeholder="leader_order_id" />
      <textarea id="routeBody">{"pickup_hub_id":"","supply_partner_id":""}</textarea>
      <button id="routeBtn">POST /leader-orders/{id}/route-fulfillment</button>
      <pre id="routeOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Calculate Earnings</h2>
      <textarea id="earnBody">{"leader_order_id":"","member_order_id":"","pickup_hub_id":"","delivery_task_id":"","driver_user_id":"","fulfillment_order_id":"","supply_partner_id":""}</textarea>
      <button id="earnBtn">POST /earnings/calculate</button>
      <pre id="earnOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Create Settlement</h2>
      <textarea id="settleBody">{"owner_type":"merchant","owner_id":""}</textarea>
      <button id="settleBtn">POST /settlements</button>
      <pre id="settleOut" class="out"></pre>
    </article>
  </section>
</main>
<script src="/assets/app.js"></script>
<script>
Fresh2U.bindAuthPanel();

document.getElementById("productBtn").onclick = async () => {
  try { Fresh2U.print("productOut", await Fresh2U.api("/api/v1/products", "POST", JSON.parse(document.getElementById("productBody").value))); }
  catch (e) { Fresh2U.print("productOut", e.message); }
};

document.getElementById("routeBtn").onclick = async () => {
  try {
    const id = document.getElementById("leaderOrderId").value;
    Fresh2U.print("routeOut", await Fresh2U.api(`/api/v1/leader-orders/${id}/route-fulfillment`, "POST", JSON.parse(document.getElementById("routeBody").value)));
  } catch (e) { Fresh2U.print("routeOut", e.message); }
};

document.getElementById("earnBtn").onclick = async () => {
  try { Fresh2U.print("earnOut", await Fresh2U.api("/api/v1/earnings/calculate", "POST", JSON.parse(document.getElementById("earnBody").value))); }
  catch (e) { Fresh2U.print("earnOut", e.message); }
};

document.getElementById("settleBtn").onclick = async () => {
  try { Fresh2U.print("settleOut", await Fresh2U.api("/api/v1/settlements", "POST", JSON.parse(document.getElementById("settleBody").value))); }
  catch (e) { Fresh2U.print("settleOut", e.message); }
};
</script>
</body>
</html>
