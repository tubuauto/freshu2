<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Console</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body><main class="shell">
  <section class="topbar">
    <h1>Admin Console</h1>
    <div class="role-nav"><a href="/pages/index.html">All Roles</a></div>
    <div class="controls">
      <input id="authEmail" value="admin@fresh2u.local" />
      <input id="authPassword" type="password" value="pass123456" />
      <input id="authTenant" placeholder="tenant merchant id" />
      <button id="loginBtn">Login</button>
    </div>
    <pre id="authOut" class="out"></pre>
  </section>

  <section class="grid">
    <article class="card">
      <h2>Review Cash Recharge</h2>
      <input id="rechargeId" placeholder="recharge_order_id" />
      <select id="rechargeAction"><option>approve</option><option>reject</option></select>
      <button id="rechargeBtn">POST /recharges/{id}/review</button>
      <pre id="rechargeOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Review Withdrawal</h2>
      <input id="withdrawalId" placeholder="withdrawal_request_id" />
      <select id="withdrawAction"><option>approve</option><option>reject</option></select>
      <button id="withdrawBtn">POST /withdrawals/{id}/review</button>
      <pre id="withdrawOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Review Settlement</h2>
      <input id="settlementId" placeholder="settlement_id" />
      <select id="settleAction"><option>approve</option><option>reject</option></select>
      <button id="reviewSettleBtn">POST /settlements/{id}/review</button>
      <button id="postSettleBtn" class="alt">POST /settlements/{id}/post</button>
      <pre id="settleOut" class="out"></pre>
    </article>

    <article class="card">
      <h2>Ledger Entries</h2>
      <button id="ledgerBtn">GET /ledger-entries</button>
      <pre id="ledgerOut" class="out"></pre>
    </article>
  </section>
</main>
<script src="/assets/app.js"></script>
<script>
Fresh2U.bindAuthPanel();
document.getElementById("rechargeBtn").onclick = async () => {
  try {
    const id = document.getElementById("rechargeId").value;
    const action = document.getElementById("rechargeAction").value;
    Fresh2U.print("rechargeOut", await Fresh2U.api(`/api/v1/recharges/${id}/review`, "POST", { action }));
  } catch (e) { Fresh2U.print("rechargeOut", e.message); }
};

document.getElementById("withdrawBtn").onclick = async () => {
  try {
    const id = document.getElementById("withdrawalId").value;
    const action = document.getElementById("withdrawAction").value;
    Fresh2U.print("withdrawOut", await Fresh2U.api(`/api/v1/withdrawals/${id}/review`, "POST", { action }));
  } catch (e) { Fresh2U.print("withdrawOut", e.message); }
};

document.getElementById("reviewSettleBtn").onclick = async () => {
  try {
    const id = document.getElementById("settlementId").value;
    const action = document.getElementById("settleAction").value;
    Fresh2U.print("settleOut", await Fresh2U.api(`/api/v1/settlements/${id}/review`, "POST", { action }));
  } catch (e) { Fresh2U.print("settleOut", e.message); }
};

document.getElementById("postSettleBtn").onclick = async () => {
  try {
    const id = document.getElementById("settlementId").value;
    Fresh2U.print("settleOut", await Fresh2U.api(`/api/v1/settlements/${id}/post`, "POST", {}));
  } catch (e) { Fresh2U.print("settleOut", e.message); }
};

document.getElementById("ledgerBtn").onclick = async () => {
  try {
    Fresh2U.print("ledgerOut", await Fresh2U.api("/api/v1/ledger-entries"));
  } catch (e) { Fresh2U.print("ledgerOut", e.message); }
};
</script>
</body></html>
